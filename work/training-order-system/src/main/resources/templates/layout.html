<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title layout:title-pattern="$CONTENT_TITLE - 受発注管理システム">受発注管理システム</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { display: flex; min-height: 100vh; }
    .sidebar {
      width: 220px; min-height: 100vh;
      background-color: #212529; color: #adb5bd;
      flex-shrink: 0; padding-top: 1rem;
    }
    .sidebar .nav-link {
      color: #adb5bd; padding: .5rem 1.25rem;
      border-radius: 0.375rem; margin: 2px 8px;
    }
    .sidebar .nav-link:hover, .sidebar .nav-link.active {
      background-color: #343a40; color: #fff;
    }
    .sidebar .brand { color: #fff; font-weight: 700; padding: .75rem 1.25rem 1rem; font-size: 1rem; }
    .main-content { flex: 1; padding: 1.5rem; background-color: #f8f9fa; }
    .page-header { margin-bottom: 1rem; padding-bottom: .75rem; border-bottom: 1px solid #dee2e6; }
  </style>
</head>
<body>

<!-- サイドバー -->
<nav class="sidebar d-flex flex-column">
  <div class="brand"><i class="bi bi-box-seam me-2"></i>受発注管理</div>
  <ul class="nav flex-column">
    <!-- TODO: th:classappend="${currentUri?.startsWith('/customers')} ? 'active'" を各 nav-link に追加する -->
    <li class="nav-item">
      <a class="nav-link" th:href="@{/customers}">
        <i class="bi bi-people me-2"></i>顧客管理
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" th:href="@{/products}">
        <i class="bi bi-box me-2"></i>商品管理
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" th:href="@{/orders}">
        <i class="bi bi-receipt me-2"></i>受注管理
      </a>
    </li>
  </ul>
  <div class="mt-auto p-3 border-top border-secondary">
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-sm btn-outline-secondary w-100">
        <i class="bi bi-box-arrow-left me-1"></i>ログアウト
      </button>
    </form>
  </div>
</nav>

<!-- メインコンテンツ -->
<main class="main-content">
  <div layout:fragment="content">
    <!-- 各ページのコンテンツがここに入る -->
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
