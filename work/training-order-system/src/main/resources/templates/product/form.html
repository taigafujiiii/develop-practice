<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>商品登録</title></head>
<body>
<div layout:fragment="content">
  <div class="page-header">
    <h4 class="mb-0 fw-bold">
      <i class="bi bi-box me-2 text-success"></i>
      <!-- TODO: productId の有無で「商品編集」「商品登録」を切り替える -->
      商品登録
    </h4>
  </div>

  <div class="card" style="max-width:520px;">
    <div class="card-body p-4">
      <!-- TODO: th:action（新規・編集の切り替え）と th:object="${productForm}" を追加する -->
      <form action="#" method="post">

        <div class="mb-3">
          <label class="form-label fw-semibold">商品名 <span class="text-danger">*</span></label>
          <!-- TODO: th:field と th:classappend を追加する -->
          <input type="text" class="form-control">
          <div class="invalid-feedback"></div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">カテゴリ</label>
          <!-- TODO: th:field="*{category}" を追加する -->
          <select class="form-select">
            <option value="">選択してください</option>
            <option value="ソフトウェア">ソフトウェア</option>
            <option value="ハードウェア">ハードウェア</option>
            <option value="サービス">サービス</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="row mb-3">
          <div class="col">
            <label class="form-label fw-semibold">単価（円） <span class="text-danger">*</span></label>
            <!-- TODO: th:field と th:classappend を追加する -->
            <input type="number" class="form-control" min="1">
            <div class="invalid-feedback"></div>
          </div>
          <div class="col">
            <label class="form-label fw-semibold">在庫数 <span class="text-danger">*</span></label>
            <!-- TODO: th:field と th:classappend を追加する -->
            <input type="number" class="form-control" min="0">
            <div class="invalid-feedback"></div>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success">
            <i class="bi bi-check-lg me-1"></i>
            <!-- TODO: productId の有無で「更新する」「登録する」を切り替える -->
            登録する
          </button>
          <!-- TODO: th:href="@{/products}" を追加する -->
          <a href="#" class="btn btn-outline-secondary">キャンセル</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
