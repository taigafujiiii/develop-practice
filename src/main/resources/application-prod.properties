# ======================================================
# 本番環境設定（Railway）
# PGHOST / PGPORT / PGDATABASE / PGUSER / PGPASSWORD は
# Railway の PostgreSQL サービスが自動で注入する
# ======================================================
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================================================
# JPA / Hibernate 設定
# ======================================================
# 本番は validate（自動変更しない）か update を使用
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ======================================================
# Thymeleaf 設定
# ======================================================
spring.thymeleaf.cache=true

# ======================================================
# サーバー設定
# Railway は PORT 環境変数でポートを注入する
# ======================================================
server.port=${PORT:8080}
