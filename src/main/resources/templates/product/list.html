<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>商品一覧</title></head>
<body>
<div layout:fragment="content">
  <div class="page-header d-flex justify-content-between align-items-center">
    <h4 class="mb-0 fw-bold"><i class="bi bi-box me-2 text-success"></i>商品管理</h4>
    <a th:href="@{/products/new}" class="btn btn-success btn-sm">
      <i class="bi bi-plus-lg me-1"></i>新規登録
    </a>
  </div>

  <!-- カテゴリフィルター -->
  <form th:action="@{/products}" method="get" class="mb-3 d-flex align-items-center gap-2">
    <select name="category" class="form-select form-select-sm" style="width:180px;">
      <option value="">すべてのカテゴリ</option>
      <option value="ソフトウェア" th:selected="${selectedCategory == 'ソフトウェア'}">ソフトウェア</option>
      <option value="ハードウェア" th:selected="${selectedCategory == 'ハードウェア'}">ハードウェア</option>
      <option value="サービス"     th:selected="${selectedCategory == 'サービス'}">サービス</option>
      <option value="その他"       th:selected="${selectedCategory == 'その他'}">その他</option>
    </select>
    <button type="submit" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-funnel me-1"></i>絞り込み
    </button>
    <a th:if="${selectedCategory != null and !selectedCategory.isEmpty()}"
       th:href="@{/products}" class="btn btn-link btn-sm text-muted">クリア</a>
  </form>

  <div class="card">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead>
          <tr>
            <th class="ps-3">ID</th>
            <th>商品名</th>
            <th>カテゴリ</th>
            <th class="text-end">単価（円）</th>
            <th class="text-end">在庫数</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="p : ${products}">
            <td class="ps-3 text-muted" th:text="${p.id}"></td>
            <td class="fw-semibold" th:text="${p.productName}"></td>
            <td>
              <span th:if="${p.category != null and !p.category.isEmpty()}"
                    class="badge bg-light text-secondary border" th:text="${p.category}"></span>
              <span th:unless="${p.category != null and !p.category.isEmpty()}"
                    class="text-muted small">—</span>
            </td>
            <td class="text-end" th:text="${#numbers.formatInteger(p.unitPrice, 1, 'COMMA')}"></td>
            <td class="text-end" th:text="${p.stockQuantity}"></td>
            <td class="text-end pe-3">
              <a th:href="@{/products/{id}/edit(id=${p.id})}" class="btn btn-outline-secondary btn-sm me-1">
                <i class="bi bi-pencil"></i>
              </a>
              <form th:action="@{/products/{id}/delete(id=${p.id})}" method="post" class="d-inline"
                    onsubmit="return confirm('削除しますか？')">
                <button type="submit" class="btn btn-outline-danger btn-sm">
                  <i class="bi bi-trash"></i>
                </button>
              </form>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="6" class="text-center text-muted py-4">商品データがありません</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="card-footer text-muted small">
      <span th:text="${#lists.size(products)}"></span> 件
    </div>
  </div>
</div>
</body>
</html>
