<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン - 受発注管理システム</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background-color: #f8f9fa; }
    .login-card { max-width: 400px; margin: 6rem auto; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <i class="bi bi-box-seam fs-1 text-primary"></i>
    <h5 class="mt-2 fw-bold">受発注管理システム</h5>
  </div>
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h6 class="card-title mb-3 fw-bold">ログイン</h6>

      <!-- ログイン失敗メッセージ -->
      <div th:if="${param.error}" class="alert alert-danger py-2 small">
        ユーザー名またはパスワードが正しくありません。
      </div>
      <!-- ログアウト成功メッセージ -->
      <div th:if="${param.logout}" class="alert alert-success py-2 small">
        ログアウトしました。
      </div>
      <!-- アカウント登録成功メッセージ -->
      <div th:if="${param.registered}" class="alert alert-success py-2 small">
        アカウントを登録しました。ログインしてください。
      </div>

      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label for="username" class="form-label small fw-semibold">ユーザー名</label>
          <input type="text" id="username" name="username" class="form-control"
                 placeholder="ユーザー名を入力" autofocus>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label small fw-semibold">パスワード</label>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="パスワードを入力">
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>ログイン
        </button>
      </form>
    </div>
  </div>
  <div class="text-center mt-3 small text-muted">
    アカウントをお持ちでない方は
    <a th:href="@{/register}" class="text-decoration-none">こちらから登録</a>
  </div>
</div>
</body>
</html>
